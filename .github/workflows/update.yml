name: Update Proxies

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cmd/**"
      - "internal/**"
      - ".github/workflows/update.yml"
      - "go.mod"

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_AGENT: proxy-pulse-action
          VALIDATION_TIMEOUT: 8s
          VALIDATION_CONCURRENCY: 24
        run: go run ./cmd/proxy-updater

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md stats.json http.txt socks4.txt socks5.txt all.txt assets/banner.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh proxy lists"
          git push
